name: Deploy to Azure App Service

on:
  workflow_run:
    # Deploy only after CI quality gates complete.
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-app-service-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy ASP.NET Core MVC app
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Check out exact commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore GalacticMissionControl.sln

      - name: Publish ASP.NET Core MVC web app
        run: >-
          dotnet publish GalacticMissionControl.Web/GalacticMissionControl.Web.csproj
          --configuration Release
          --output ${{ github.workspace }}/publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          # Configure these in repository/environment Variables or Secrets.
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ github.workspace }}/publish
